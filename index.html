<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Texture Packs</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js to render Modrinth's markdown descriptions safely -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <style>
        /* Custom acrylic / glassmorphism blur effect */
        .glass-panel {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: #0d0d11;
            color: #e2e8f0;
        }
        /* Custom markdown styling for the description injector */
        .prose img { max-width: 100%; border-radius: 0.5rem; margin: 1rem 0; }
        .prose h1, .prose h2, .prose h3 { color: #f8fafc; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .prose h1 { font-size: 1.5rem; }
        .prose h2 { font-size: 1.25rem; }
        .prose p { margin-bottom: 1rem; color: #cbd5e1; line-height: 1.6; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose a { color: #ef4444; text-decoration: underline; }
        .prose a:hover { color: #f87171; }
    </style>
</head>
<body class="min-h-screen font-sans antialiased selection:bg-red-500/30">

    <!-- Top Navigation Bar -->
    <nav class="sticky top-0 z-50 glass-panel border-b border-white/5 transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="." id="nav-home" class="flex items-center gap-2 font-bold text-xl tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-slate-100 to-slate-400">
                ANIME<span class="text-red-500">PACKS</span>
            </a>
            <div class="flex items-center gap-4 text-sm font-medium text-slate-400">
                <a href="https://modrinth.com/user/HypX2L" class="hover:text-white transition-colors">Gallery</a>
                <a href="https://modrinth.com/user/HypX2L" target="_blank" rel="noopener" class="px-3 py-1.5 rounded-md bg-white/5 hover:bg-white/10 text-white transition-all border border-white/10">Modrinth Profile</a>
            </div>
        </div>
    </nav>

    <!-- Main Content Container Area -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <!-- VIEW 1: HOME GALLERY (Shown by default) -->
        <section id="gallery-view" class="space-y-6">
            <div class="border-l-4 border-red-500 pl-4 py-1">
                <h1 class="text-3xl font-black tracking-tight text-white">TEXTURE PACKS</h1>
                <p class="text-slate-400 text-sm mt-1">Direct integration with Modrinth ecosystem</p>
            </div>
            
            <!-- Loading Grid State -->
            <div id="gallery-loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="h-64 rounded-xl bg-white/5 animate-pulse"></div>
                <div class="h-64 rounded-xl bg-white/5 animate-pulse"></div>
                <div class="h-64 rounded-xl bg-white/5 animate-pulse"></div>
            </div>

            <!-- Dynamic Target Cards Container -->
            <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>
        </section>

        <!-- VIEW 2: INDIVIDUAL PACK DETAIL PAGE (Hidden by default) -->
        <section id="detail-view" class="hidden space-y-6 animate-fade-in">
            <!-- Back Action -->
            <button onclick="navigateToHome()" class="flex items-center gap-2 text-sm font-semibold text-slate-400 hover:text-white transition-colors group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                Back to Gallery
            </button>

            <!-- Pack Hero Layout -->
            <div class="rounded-2xl overflow-hidden glass-panel relative">
                <!-- Background Banner Image Layer -->
                <div id="pack-banner" class="w-full h-48 md:h-64 bg-cover bg-center relative after:absolute after:inset-0 after:bg-gradient-to-t after:from-[#0d0d11] after:to-transparent"></div>
                
                <!-- Positioning Context Container -->
                <div class="px-6 pb-6 pt-4 relative z-10 flex flex-col md:flex-row gap-6 items-start md:items-end -mt-16 md:-mt-20">
                    <img id="pack-icon" src="" alt="Pack Icon" class="w-24 h-24 md:w-32 md:h-32 rounded-2xl border-4 border-[#0d0d11] bg-[#1a1a24] shadow-2xl object-cover">
                    <div class="flex-1 space-y-2">
                        <h2 id="pack-title" class="text-2xl md:text-4xl font-extrabold text-white tracking-tight"></h2>
                        <p id="pack-summary" class="text-slate-300 text-sm md:text-base max-w-2xl"></p>
                    </div>
                    <div class="pt-4 md:pt-0 w-full md:w-auto">
                        <a id="pack-modrinth-link" href="" target="_blank" rel="noopener" class="w-full md:w-auto inline-flex items-center justify-center gap-2 px-6 py-3 bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 text-white font-bold rounded-xl shadow-lg shadow-red-950/50 hover:scale-[1.02] active:scale-[0.98] transition-all whitespace-nowrap">
                            View on Modrinth
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Detailed Body Readme Content -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 glass-panel rounded-2xl p-6 md:p-8">
                    <h3 class="text-lg font-bold text-white mb-4 border-b border-white/10 pb-2">Description</h3>
                    <article id="pack-body" class="prose max-w-none"></article>
                </div>
                <!-- Side Panel Metadata Box -->
                <div class="space-y-6">
                    <div class="glass-panel rounded-2xl p-6 space-y-4 text-sm">
                        <h3 class="font-bold text-white uppercase tracking-wider text-xs border-b border-white/10 pb-2">Information</h3>
                        <div class="flex justify-between"><span class="text-slate-400">Downloads</span><span id="meta-downloads" class="text-slate-200 font-mono font-medium"></span></div>
                        <div class="flex justify-between"><span class="text-slate-400">Client Side</span><span id="meta-client" class="text-slate-200 font-medium"></span></div>
                        <div class="flex justify-between"><span class="text-slate-400">Server Side</span><span id="meta-server" class="text-slate-200 font-medium"></span></div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Core Routing and API Consumer Script Layer -->
    <script>
        /**
         * HOW TO ADD NEW TEXTURE PACKS:
         * Add your Modrinth Project IDs or project slugs into this array.
         * The application will dynamically map everything else from Modrinth.
         */
        const PACK_IDS = [
            'templatetexures',
            'frieren',
            'anime-openings-(music)',
            'cyberpunk-edgerunners',
            'i-made-friends-with-the-second-prettiest-girl-in-my-class-gui',
            '86-eightysix',
            'zero-two',
            'oshi-no-ko'
        ];

        // Global structural cache object
        let projectsCache = {};

        // Application State Engine initialization
        async function initApp() {
            window.addEventListener('popstate', handleRouting);
            await fetchAllProjects();
            handleRouting();
        }

        // Helper function to extract the featured image from the gallery array
        function getFeaturedBanner(project) {
            const fallbackBanner = 'https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=1200';
            
            if (project.gallery && project.gallery.length > 0) {
                // Look for an item explicitly flagged as featured
                const featuredItem = project.gallery.find(item => item.featured === true);
                if (featuredItem) return featuredItem.url;
                
                // Fallback to the very first gallery image if none are flagged
                return project.gallery[0].url;
            }
            
            return fallbackBanner;
        }

        // Fetch data bulk array wrapper directly from Modrinth API endpoint
        async function fetchAllProjects() {
            if (PACK_IDS.length === 0) return;
            
            try {
                // Formatting parameters structure for API query path
                const queryParam = JSON.stringify(PACK_IDS);
                const response = await fetch(`https://api.modrinth.com/v2/projects?ids=${encodeURIComponent(queryParam)}`);
                
                if (!response.ok) throw new Error('Failed to synchronize with Modrinth API instances');
                
                const data = await response.json();
                
                // Map the projects array into a fast cache keypair resource
                data.forEach(project => {
                    projectsCache[project.id] = project;
                    // Also cache using slug mapping reference points
                    if (project.slug) {
                        projectsCache[project.slug] = project;
                    }
                });

                renderGallery(data);
            } catch (err) {
                console.error("Critical architecture initialization failure: ", err);
                document.getElementById('gallery-loading').innerHTML = `
                    <div class="col-span-full p-6 bg-red-950/30 border border-red-500/20 text-red-400 rounded-xl">
                        Failed to build pack definitions. Confirm internet access or your project identifier configurations.
                    </div>
                `;
            }
        }

        // Display card array loop configuration markup rendering interface
        function renderGallery(projects) {
            const grid = document.getElementById('gallery-grid');
            const loading = document.getElementById('gallery-loading');
            grid.innerHTML = '';

            projects.forEach(project => {
                // Fallbacks for missing assets
                const icon = project.icon_url || 'https://img.icons8.com/color/96/minecraft-main.png';
                const banner = getFeaturedBanner(project);

                const card = document.createElement('div');
                card.className = 'glass-panel rounded-2xl overflow-hidden group hover:scale-[1.02] transition-all duration-300 flex flex-col cursor-pointer shadow-lg shadow-black/20';
                card.onclick = () => navigateToPack(project.slug || project.id);

                card.innerHTML = `
                    <div class="h-32 w-full bg-cover bg-center transform group-hover:scale-105 transition-transform duration-500" style="background-image: url('${banner}')"></div>
                    <div class="p-5 flex gap-4 flex-1 items-start -mt-8 relative z-10">
                        <img src="${icon}" alt="${project.title}" class="w-16 h-16 rounded-xl border-4 border-[#141419] bg-[#1a1a24] shadow-md object-cover">
                        <div class="flex-1 min-w-0 pt-8">
                            <h3 class="text-lg font-bold text-white group-hover:text-red-400 transition-colors truncate">${project.title}</h3>
                            <p class="text-slate-400 text-xs line-clamp-2 mt-1 leading-relaxed">${project.description || 'No description assigned'}</p>
                        </div>
                    </div>
                    <div class="px-5 pb-5 pt-2 mt-auto border-t border-white/5 flex items-center justify-between text-xs text-slate-500">
                        <span class="flex items-center gap-1 font-medium text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" /></svg>
                            ${project.downloads.toLocaleString()} downloads
                        </span>
                        <span class="text-red-500 font-bold group-hover:underline inline-flex items-center gap-0.5">
                            View Pack
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                        </span>
                    </div>
                `;
                grid.appendChild(card);
            });

            loading.classList.add('hidden');
            grid.classList.remove('hidden');
        }

        // Render data configurations inside specific dynamic identifier views
        function renderPackDetail(project) {
            const defaultIcon = 'https://img.icons8.com/color/96/minecraft-main.png';
            const banner = getFeaturedBanner(project);

            document.getElementById('pack-banner').style.backgroundImage = `url('${banner}')`;
            document.getElementById('pack-icon').src = project.icon_url || defaultIcon;
            document.getElementById('pack-title').innerText = project.title;
            document.getElementById('pack-summary').innerText = project.description;
            
            // Generate link structure safely referencing Modrinth project route types
            document.getElementById('pack-modrinth-link').href = `https://modrinth.com/${project.project_type || 'resourcepack'}/${project.slug || project.id}`;
            
            // Side contextual data mapping pipelines
            document.getElementById('meta-downloads').innerText = project.downloads.toLocaleString();
            document.getElementById('meta-client').innerText = project.client_side || 'optional';
            document.getElementById('meta-server').innerText = project.server_side || 'unsupported';

            // Injection parsing wrapper for core multi-line descriptions
            if(window.marked && project.body) {
                document.getElementById('pack-body').innerHTML = marked.parse(project.body);
            } else {
                document.getElementById('pack-body').innerText = project.body_description || 'Detailed summary missing.';
            }

            // Window title synchronization updates
            document.title = `${project.title} - Anime Texture Packs`;
        }

        // Simple router processing state configurations
        function handleRouting() {
            const urlParams = new URLSearchParams(window.location.search);
            const packParam = urlParams.get('pack');

            const galleryView = document.getElementById('gallery-view');
            const detailView = document.getElementById('detail-view');

            if (packParam && projectsCache[packParam]) {
                renderPackDetail(projectsCache[packParam]);
                galleryView.classList.add('hidden');
                detailView.classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                detailView.classList.add('hidden');
                galleryView.classList.remove('hidden');
                document.title = 'Anime Texture Packs';
            }
        }

        // State changes and link intercept configurations
        function navigateToPack(idOrSlug) {
            const newUrl = `${window.location.pathname}?pack=${encodeURIComponent(idOrSlug)}`;
            window.history.pushState({ pack: idOrSlug }, '', newUrl);
            handleRouting();
        }

        // Navigation state setup
        function navigateToHome() {
            const newUrl = window.location.pathname;
            window.history.pushState({}, '', newUrl);
            handleRouting();
        }

        // Attach layout home navigator interceptors
        document.getElementById('nav-home').addEventListener('click', (e) => {
            e.preventDefault();
            navigateToHome();
        });

        // Initialize execution setup pipelines
        initApp();
    </script>
</body>
</html>
