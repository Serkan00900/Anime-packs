name: Run Modrinth Tracker Bot

on:
  schedule:
    - cron: '0 * * * *' # Wakes up automatically every single hour
  workflow_dispatch: # Allows manual button click to test instantly

permissions:
  contents: write # Required for the cache file saving process

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4.2.2 # Fixed version that supports Node 24 runners

    - name: Set Up Python Environment
      uses: actions/setup-python@v5.4.0 # Fixed version that supports Node 24 runners
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install requests

    - name: Run Script and Check Updates
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python Discord/bot.py

    - name: Save Cache for Next Run
      uses: stefanzweifel/git-auto-commit-action@v5.1.0 # Updated for full Node 24 compatibility
      with:
        commit_message: "Update last posted pack cache [skip ci]"
        file_pattern: 'Discord/last_posted_project.txt'
