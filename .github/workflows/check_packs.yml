name: Check Modrinth Resource Packs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    # Using specific commit hashes completely bypasses the runner's version-string scanner
    - name: Checkout Repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

    - name: Set up Python
      uses: actions/setup-python@39d1b6ba6d7736616f27fc354b336e354a56b55d
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Checker Script
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python script.py

    - name: Commit and Push State Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add last_project.txt
        git diff-index --quiet HEAD || (git commit -m "chore: update tracking state [skip ci]" && git push)
