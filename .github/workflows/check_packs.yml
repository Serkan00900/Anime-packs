name: Check Modrinth Resource Packs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # This shuts up the annoying Node.js version warnings in the logs
  ACTIONS_NODES_WARNING: 'false'

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Checker Script
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python script.py

    - name: Commit and Push State Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add last_project.txt
        git diff-index --quiet HEAD || (git commit -m "chore: update tracking state [skip ci]" && git push)
