name: Check Modrinth Resource Packs

on:
  schedule:
    # Runs every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab to test it

env:
  # Forces actions to run on Node 24 to clear the deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the action to save the state file back to your repo

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Fixed the typo here from python-python

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Checker Script
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python script.py

    - name: Commit and Push State Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add last_project.txt
        # Only commit if the file actually changed to avoid empty commit errors
        git diff-index --quiet HEAD || (git commit -m "chore: update tracking state [skip ci]" && git push)
